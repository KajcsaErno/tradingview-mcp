name: CI

on: [push, pull_request]

jobs:
  test:
    name: Offline tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      # Offline suite only — no live TradingView (:9222) and no Binance keys.
      # The Binance tests are fully dependency-injected (no network).
      - run: npm test
