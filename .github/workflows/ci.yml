name: CI

on: [push, pull_request]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Offline tests (${{ matrix.os }}, node ${{ matrix.node-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Node >= 22.15 required: tests use node:module registerHooks, and the
        # test scripts rely on node --test's native glob support on Windows.
        os: [ ubuntu-latest, windows-latest ]
        node-version: [ 22.x, 24.x ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      # Offline suite only — no live TradingView (:9222) and no Binance keys.
      # The Binance tests are fully dependency-injected (no network).
      - run: npm test
